server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ai-farmer-companion

  # ======================== Database ========================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:farmerai}
    username: ${DB_USER:farmerai}
    password: ${DB_PASSWORD:farmerai}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ======================== JPA ========================
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ======================== Flyway ========================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# ======================== JWT ========================
app:
  jwt:
    secret: ${JWT_SECRET:dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JBSUZ1cm1lckNvbXBhbmlvbkFwcA==}
    access-token:
      expiration-ms: 900000       # 15 minutes
    refresh-token:
      expiration-ms: 604800000    # 7 days
    issuer: ai-farmer-companion

# ======================== Logging ========================
logging:
  level:
    root: INFO
    com.farmerai.companion: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

# ======================== OpenAPI ========================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# ======================== Actuator ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
